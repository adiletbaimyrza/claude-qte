name: Build macOS binary

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    name: Lint + format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install ruff
        run: pip install "ruff>=0.6"

      - name: ruff check
        run: ruff check

      - name: ruff format --check
        run: ruff format --check

  test:
    name: Tests
    needs: lint
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run pytest
        run: pytest

  build:
    name: Build (macos-arm64)
    needs: test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-build.txt
          pip install .

      - name: Build with PyInstaller
        run: pyinstaller --clean --noconfirm claude_qte.spec

      - name: Rename artifact
        run: mv dist/claude-qte dist/claude-qte-macos-arm64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: claude-qte-macos-arm64
          path: dist/claude-qte-macos-arm64
          if-no-files-found: error

  release:
    name: Attach binary to release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Stage release files
        run: |
          mkdir -p dist
          find artifacts -mindepth 2 -type f -exec mv -t dist {} +

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
